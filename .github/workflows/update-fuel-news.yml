name: Update AFE fuel news

on:
  schedule:
    # Daily at 07:30 UTC
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: afe-fuel-news-refresh
  cancel-in-progress: false

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh fuel news from GDELT
        run: |
          python scripts/update_fuel_news.py \
            --days 21 \
            --max-per-query 6 \
            --max-per-country 4 \
            --queries-per-country 1 \
            --timeout 20 \
            --sleep 5 \
            --retries 4 \
            --backoff 5 \
            --keep-existing

      - name: Commit updated news JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Save generated outputs outside the repo
          mkdir -p /tmp/fuel_news_outputs
          cp dashboard/data/fuel_news.json /tmp/fuel_news_outputs/fuel_news.json
          cp dashboard/data/fuel_news_last_updated.json /tmp/fuel_news_outputs/fuel_news_last_updated.json
          cp dashboard/data/fuel_news_rejected.json /tmp/fuel_news_outputs/fuel_news_rejected.json || true

          # Move repo to latest remote main to avoid generated-file conflicts
          git fetch origin main
          git reset --hard origin/main

          # Copy generated outputs back into the repo
          cp /tmp/fuel_news_outputs/fuel_news.json dashboard/data/fuel_news.json
          cp /tmp/fuel_news_outputs/fuel_news_last_updated.json dashboard/data/fuel_news_last_updated.json
          cp /tmp/fuel_news_outputs/fuel_news_rejected.json dashboard/data/fuel_news_rejected.json || true

          git add dashboard/data/fuel_news.json
          git add dashboard/data/fuel_news_last_updated.json
          git add dashboard/data/fuel_news_rejected.json

          if git diff --cached --quiet; then
            echo "No news JSON changes to commit."
            exit 0
          fi

          git commit -m "Refresh AFE fuel news from GDELT"
          git push origin main
