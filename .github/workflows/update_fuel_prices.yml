name: Update official fuel prices

on:
  workflow_dispatch:
  schedule:
    # Run once every 24 hours at 06:15 UTC
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright
          python -m playwright install --with-deps chromium

      - name: Update official fuel price data
        run: |
          python scripts/update_fuel_prices.py \
            --index dashboard/index.html \
            --output dashboard/data/fuel_prices.json \
            --last-updated dashboard/data/fuel_prices_last_updated.json \
            --report dashboard/data/fuel_prices_refresh_report.json \
            --timeout 60 \
            --debug-dir dashboard/data/scraper_debug \
            --countries \
              Madagascar \
              Kenya \
              Tanzania \
              Zambia \
              "South Africa" \
              Rwanda \
              Mauritius \
              Zimbabwe \
              Namibia \
              Seychelles \
              Malawi \
              Mozambique \
              Botswana \
              Ethiopia \
              Eswatini \
              Lesotho \
              Angola

      - name: Validate generated fuel price data
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path

          for p in [
              "dashboard/data/fuel_prices.json",
              "dashboard/data/fuel_prices_last_updated.json",
              "dashboard/data/fuel_prices_refresh_report.json",
          ]:
              p = Path(p)
              if not p.exists() or p.stat().st_size == 0:
                  raise SystemExit(f"Missing or empty output file: {p}")

          report = json.loads(Path("dashboard/data/fuel_prices_refresh_report.json").read_text())
          fuel   = json.loads(Path("dashboard/data/fuel_prices.json").read_text())

          # Hard-fail only on unhandled exceptions in the scraper.
          # 0 rows = site structure changed, needs human investigation — not a pipeline break.
          hard = report.get("hard_failures", [])
          if hard:
              raise SystemExit(f"Scrapers threw exceptions for: {hard}")

          # Print a summary so the log is useful
          countries = report.get("countries", {})
          ok, warn, stub = [], [], []
          for country, info in sorted(countries.items()):
              status = info["status"]
              rows   = fuel.get(country, [])
              n      = len(rows) if isinstance(rows, list) else 0
              latest = max((r["observation_date"] for r in rows), default="—")
              if status == "ok":
                  ok.append(f"  OK            {country:25s} {n:4d} rows  latest={latest}")
              elif status == "not_implemented":
                  stub.append(f"  stub          {country:25s} (scraper not yet built)")
              else:
                  warn.append(f"  WARNING       {country:25s} {n:4d} rows  {info['message'][:60]}")

          print("=== Scraper results ===")
          for line in ok:   print(line)
          for line in warn: print(line)
          for line in stub: print(line)

          manual = report.get("manual_countries", [])
          if manual:
              print(f"\n  manual entry  {', '.join(sorted(manual))}")
          PY

      - name: Show refresh report
        run: |
          echo "===== fuel_prices_refresh_report.json ====="
          cat dashboard/data/fuel_prices_refresh_report.json

          echo ""
          echo "===== fuel_prices.json row counts ====="
          python - <<'PY'
          import json
          from pathlib import Path
          fuel = json.loads(Path("dashboard/data/fuel_prices.json").read_text())
          for country, rows in sorted(fuel.items()):
              n      = len(rows) if isinstance(rows, list) else "ERR"
              latest = max((r["observation_date"] for r in rows), default="—") if isinstance(rows, list) and rows else "—"
              print(f"  {country:30s} {str(n):>4} rows  latest={latest}")
          PY

      - name: Commit updated fuel price data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            dashboard/data/fuel_prices.json \
            dashboard/data/fuel_prices_last_updated.json \
            dashboard/data/fuel_prices_refresh_report.json \
            "dashboard/data/scraper_debug/" || true

          if git diff --cached --quiet; then
            echo "No fuel price data changes to commit."
          else
            git commit -m "chore: update fuel prices $(date -u +%Y-%m-%d)"
            git push
          fi
