name: Update official fuel prices

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright
          python -m playwright install --with-deps chromium

      - name: Scrape auto-updatable countries
        # Countries with machine-readable official sources
        # Uganda, DRC, Sao Tome are excluded — no reliable scrape target
        run: |
          python scripts/update_fuel_prices.py \
            --output dashboard/data/fuel_prices.json \
            --last-updated dashboard/data/fuel_prices_last_updated.json \
            --report dashboard/data/fuel_prices_refresh_report.json \
            --timeout 60 \
            --debug-dir dashboard/data/scraper_debug \
            --countries \
              Kenya \
              "South Africa" \
              Tanzania \
              Rwanda \
              Mauritius \
              Zimbabwe \
              Namibia \
              Zambia \
              Botswana \
              Ethiopia \
              Eswatini \
              Lesotho \
              Madagascar \
              Malawi \
              Mozambique \
              Seychelles \
              Angola

      - name: Validate output
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          FULL_SERIES  = {"Kenya","South Africa","Tanzania","Rwanda","Mauritius",
                          "Zimbabwe","Namibia","Zambia"}
          SPARSE       = {"Botswana","Ethiopia","Eswatini","Lesotho","Madagascar",
                          "Malawi","Mozambique","Seychelles","Angola"}
          MANUAL       = {"Uganda","Congo, Dem. Rep.","Sao Tome and Principe"}
          REQUIRED     = ["observation_date","fuel_family","fuel_product",
                          "price_local","currency","source_url"]

          fuel   = json.loads(Path("dashboard/data/fuel_prices.json").read_text())
          report = json.loads(Path("dashboard/data/fuel_prices_refresh_report.json").read_text())

          hard_failures = []   # full-series countries with 0 rows = pipeline broken
          soft_warnings = []   # sparse countries with 0 rows = expected sometimes
          field_errors  = []

          for country in sorted(FULL_SERIES | SPARSE):
              rows = fuel.get(country, [])
              if not isinstance(rows, list) or len(rows) == 0:
                  if country in FULL_SERIES:
                      hard_failures.append(f"{country}: 0 rows (FULL SERIES — should never be empty)")
                  else:
                      soft_warnings.append(f"{country}: 0 rows (sparse source, may be stale)")
                  continue
              bad = [(i, [k for k in REQUIRED if k not in r or r[k] in ("",None)])
                     for i, r in enumerate(rows)
                     if any(k not in r or r[k] in ("",None) for k in REQUIRED)]
              if bad:
                  field_errors.append(f"{country}: {len(bad)} rows with missing fields")
              else:
                  latest = max(r["observation_date"] for r in rows)
                  tier = "FULL" if country in FULL_SERIES else "sparse"
                  print(f"  [{tier:6s}] {country:25s} {len(rows):4d} rows  latest={latest}")

          print("\n--- Manual-entry countries (not scraped) ---")
          for c in sorted(MANUAL):
              rows = fuel.get(c, [])
              n    = len(rows) if isinstance(rows, list) else 0
              latest = max(r["observation_date"] for r in rows) if n else "—"
              print(f"  [manual] {c:25s} {n:4d} rows  latest={latest}")

          if soft_warnings:
              print("\n--- Sparse source warnings (non-fatal) ---")
              for w in soft_warnings: print(" ", w)

          if field_errors:
              print("\n--- Field errors ---")
              for e in field_errors: print(" ", e)

          if hard_failures or field_errors:
              raise SystemExit("HARD FAILURES:\n" + "\n".join(hard_failures + field_errors))
          PY

      - name: Show refresh report
        run: |
          cat dashboard/data/fuel_prices_refresh_report.json

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dashboard/data/fuel_prices.json \
                  dashboard/data/fuel_prices_last_updated.json \
                  dashboard/data/fuel_prices_refresh_report.json \
                  "dashboard/data/scraper_debug/" || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update fuel prices $(date -u +%Y-%m-%d)"
            git push
          fi
