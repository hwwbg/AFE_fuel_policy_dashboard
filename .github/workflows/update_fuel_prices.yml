
name: Update official fuel prices

on:
  workflow_dispatch:
  schedule:
    # Run once every 24 hours at 06:15 UTC
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright
          python -m playwright install --with-deps chromium
      - name: Update official fuel price data from OMH
        run: |
          python scripts/update_fuel_prices.py \
            --index dashboard/index.html \
            --output dashboard/data/fuel_prices.json \
            --last-updated dashboard/data/fuel_prices_last_updated.json \
            --report dashboard/data/fuel_prices_refresh_report.json \
            --timeout 60 \
            --require-mdg \
            --debug-dir dashboard/data/omh_debug
      - name: Validate generated files
        if: always()
        run: |
          test -f dashboard/data/fuel_prices.json
          test -f dashboard/data/fuel_prices_last_updated.json
          test -f dashboard/data/fuel_prices_refresh_report.json
          python -m json.tool dashboard/data/fuel_prices.json > /dev/null
          python -m json.tool dashboard/data/fuel_prices_last_updated.json > /dev/null
          python -m json.tool dashboard/data/fuel_prices_refresh_report.json > /dev/null
          echo "Fuel price output files exist and are valid JSON."
      - name: Show refresh report
        if: always()
        run: |
          echo "===== Fuel price refresh report ====="
          cat dashboard/data/fuel_prices_refresh_report.json || true
          echo "===== OMH captured network URLs ====="
          cat dashboard/data/omh_debug/omh_network_urls.txt || true
      - name: Commit updated fuel price data and OMH debug files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/fuel_prices.json \
                  dashboard/data/fuel_prices_last_updated.json \
                  dashboard/data/fuel_prices_refresh_report.json \
                  dashboard/data/omh_debug/omh_network_urls.txt \
                  dashboard/data/omh_debug/omh_text_payloads.txt || true
          if git diff --cached --quiet; then
            echo "No fuel price data changes to commit."
          else
            git commit -m "Update OMH fuel price scrape"
            git push
          fi
