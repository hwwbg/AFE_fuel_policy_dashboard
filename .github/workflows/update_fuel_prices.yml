name: Update official fuel prices

on:
  workflow_dispatch:
  schedule:
    # Run once every 24 hours at 06:15 UTC
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas python-dateutil playwright
          python -m playwright install --with-deps chromium

      - name: Update official fuel price data
        run: |
          python scripts/update_fuel_prices.py

      - name: Validate generated files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required_files = [
              "dashboard/data/fuel_prices.json",
              "dashboard/data/fuel_prices_last_updated.json",
              "dashboard/data/fuel_prices_refresh_report.json",
          ]

          missing = [f for f in required_files if not Path(f).exists()]
          if missing:
              raise SystemExit(f"Missing expected output file(s): {missing}")

          for f in required_files:
              with open(f, "r", encoding="utf-8") as fh:
                  json.load(fh)

          print("Fuel price output files exist and are valid JSON.")
          PY

      - name: Commit updated fuel price data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dashboard/data/fuel_prices.json \
                  dashboard/data/fuel_prices_last_updated.json \
                  dashboard/data/fuel_prices_refresh_report.json

          if git diff --cached --quiet; then
            echo "No fuel price data changes to commit."
          else
            git commit -m "Update official fuel price data"
            git push
          fi
